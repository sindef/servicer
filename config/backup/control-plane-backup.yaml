apiVersion: v1
kind: ServiceAccount
metadata:
  name: servicer-control-plane-backup
  namespace: servicer-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: servicer-control-plane-backup
rules:
  - apiGroups: ["platform.servicer.io"]
    resources:
      - actionrequests
      - clustertargets
      - namespaceclaims
      - projects
      - servicebindings
      - serviceclasses
      - serviceinstances
      - serviceplans
      - tenants
      - virtualmachineclaims
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: servicer-control-plane-backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: servicer-control-plane-backup
subjects:
  - kind: ServiceAccount
    name: servicer-control-plane-backup
    namespace: servicer-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: servicer-control-plane-backups
  namespace: servicer-system
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: servicer-control-plane-backup
  namespace: servicer-system
  labels:
    app.kubernetes.io/name: servicer
    app.kubernetes.io/component: backup
spec:
  schedule: "17 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: servicer-control-plane-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: ghcr.io/sindef/servicer-tools:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  /workspace/hack/control-plane-backup.sh backup "/backups/servicer-$(date -u +%Y%m%d-%H%M%S)"
                  find /backups -maxdepth 1 -type d -name 'servicer-*' -mtime +14 -exec rm -rf {} +
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: servicer-control-plane-backups
