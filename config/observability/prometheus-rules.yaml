apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: servicer-slos
  namespace: servicer-system
  labels:
    app.kubernetes.io/name: servicer
    app.kubernetes.io/component: observability
spec:
  groups:
    - name: servicer.bff.slo
      rules:
        - record: servicer:bff_request_error_ratio5m
          expr: |
            sum(rate(servicer_bff_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(servicer_bff_http_requests_total[5m])), 1)
        - record: servicer:bff_request_p95_latency_seconds5m
          expr: |
            histogram_quantile(
              0.95,
              sum by (le) (rate(servicer_bff_http_request_duration_seconds_bucket[5m]))
            )
        - alert: ServicerBFFHighErrorRate
          expr: servicer:bff_request_error_ratio5m > 0.01
          for: 10m
          labels:
            severity: warning
            slo: availability
          annotations:
            summary: Servicer BFF 5xx error ratio is above 1%.
            description: BFF request error ratio has exceeded the 99% availability SLO for 10 minutes.
        - alert: ServicerBFFHighLatency
          expr: servicer:bff_request_p95_latency_seconds5m > 0.5
          for: 10m
          labels:
            severity: warning
            slo: latency
          annotations:
            summary: Servicer BFF p95 latency is above 500ms.
            description: BFF p95 latency has exceeded the interactive API latency SLO for 10 minutes.
        - alert: ServicerBFFAuthFailures
          expr: increase(servicer_bff_authentication_failures_total[10m]) > 20
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: Servicer BFF authentication failures are elevated.
            description: More than 20 authentication failures were observed in 10 minutes.
        - alert: ServicerBFFUpstreamFailures
          expr: increase(servicer_bff_upstream_failures_total[10m]) > 5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Servicer BFF upstream proxy failures are elevated.
            description: Kubernetes proxy upstream failures indicate control-plane or RBAC issues.
    - name: servicer.controller.slo
      rules:
        - alert: ServicerControllerReconcileErrors
          expr: sum(rate(controller_runtime_reconcile_errors_total{controller=~".*servicer.*|serviceinstance|actionrequest|project|tenant"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: Servicer controller reconcile errors detected.
            description: Controller-runtime is reporting sustained reconciliation failures.
        - alert: ServicerDeliveryPublishFailed
          expr: kube_customresource_status_condition{customresource_group="platform.servicer.io",customresource_kind="ServiceInstance",condition="Materialized",status="false",reason="PublishFailed"} > 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: Servicer delivery publication failed.
            description: A ServiceInstance could not publish generated artifacts to the configured GitOps repository.
        - alert: ServicerArgoSyncDrift
          expr: kube_customresource_status_condition{customresource_group="platform.servicer.io",customresource_kind="ServiceInstance",condition="Synced",status="false"} > 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Servicer managed delivery is not synced.
            description: A ServiceInstance has reported an unsynced or drifting Argo CD delivery state for more than 30 minutes.
        - alert: ServicerProductHealthDegraded
          expr: kube_customresource_status_condition{customresource_group="platform.servicer.io",customresource_kind="ServiceInstance",condition="Healthy",status="false"} > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Servicer product health degraded.
            description: A managed product reports degraded or failed health.
        - alert: ServicerBackupFailed
          expr: kube_job_status_failed{namespace="servicer-system",job_name=~"servicer-control-plane-backup.*"} > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Servicer control-plane backup failed.
            description: A scheduled Servicer backup job failed and needs operator review.
        - alert: ServicerControllerDown
          expr: absent(up{job=~".*servicer.*manager.*"} == 1)
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: Servicer controller manager metrics target is down.
            description: Prometheus cannot scrape the Servicer controller manager.
