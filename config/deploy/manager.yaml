# Manager reconciles ServiceInstance CRDs and materialises delivery artifacts
# to /delivery. Syncer watches /delivery and kubectl-applies to the target
# cluster every 3 seconds. Both containers share the delivery EmptyDir.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: servicer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: manager
    spec:
      serviceAccountName: servicer
      containers:
        - name: manager
          image: servicer/manager:demo
          imagePullPolicy: Never
          args:
            - --delivery-root=/delivery
            - --metrics-bind-address=:0
            - --health-probe-bind-address=:8081
          volumeMounts:
            - name: delivery
              mountPath: /delivery

        - name: syncer
          image: servicer/syncer:demo
          imagePullPolicy: Never
          env:
            - name: KUBECONFIG
              value: /kube/config
            - name: DELIVERY_ROOT
              value: /delivery
            - name: INTERVAL_SECONDS
              value: "3"
          volumeMounts:
            - name: delivery
              mountPath: /delivery
              readOnly: true
            - name: target-kubeconfig
              mountPath: /kube/config
              subPath: kubeconfig
              readOnly: true

      volumes:
        - name: delivery
          emptyDir: {}
        - name: target-kubeconfig
          secret:
            secretName: local-dev-kubeconfig
