apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: servicer
rules:
  # Compatibility profile for config/deploy (single ServiceAccount).
  # Keep explicit least-privilege rules and avoid wildcards.
  - apiGroups: ["platform.servicer.io"]
    resources:
      - actionrequests
      - authproviders
      - clustertargets
      - groups
      - namespaceclaims
      - operatorpackages
      - policies
      - projects
      - rolebindings
      - servicebindings
      - serviceclasses
      - serviceinstances
      - serviceplans
      - tenants
      - users
      - virtualmachineclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["platform.servicer.io"]
    resources:
      - actionrequests
      - authproviders
      - clustertargets
      - groups
      - namespaceclaims
      - projects
      - rolebindings
      - serviceclasses
      - serviceinstances
      - tenants
      - users
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["platform.servicer.io"]
    resources:
      - actionrequests/status
      - clustertargets/status
      - namespaceclaims/status
      - operatorpackages/status
      - policies/status
      - projects/status
      - servicebindings/status
      - serviceclasses/status
      - serviceinstances/status
      - serviceplans/status
      - tenants/status
      - virtualmachineclaims/status
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["resourcequotas"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "daemonsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["external-secrets.io"]
    resources: ["secretstores", "externalsecrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: servicer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: servicer
subjects:
  - kind: ServiceAccount
    name: servicer
    namespace: servicer-system
