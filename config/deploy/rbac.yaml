apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: servicer
rules:
  # All Servicer platform CRDs
  - apiGroups: ["platform.servicer.io"]
    resources: ["*"]
    verbs: ["*"]
  # Secrets (repository credentials, cluster kubeconfig refs)
  # Namespaces, ConfigMaps, ServiceAccounts (NamespaceClaim reconciliation)
  - apiGroups: [""]
    resources: ["secrets", "namespaces", "configmaps", "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  # Pods (observeRuntime pod health checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Apps workloads (observeRuntime StatefulSet/Deployment observation)
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # CRDs (operator detection: ArgoCD, YugabyteDB, etc.)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # ArgoCD Applications (operator package delivery)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: servicer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: servicer
subjects:
  - kind: ServiceAccount
    name: servicer
    namespace: servicer-system
