apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: servicer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: servicer/web:demo
          imagePullPolicy: Never
          env:
            - name: BFF_URL
              value: "http://bff.servicer-system.svc.cluster.local:8090"
            - name: DEMO_USER
              value: "demo-admin"
            - name: DEMO_ROLES
              value: "platform-admin,tenant-operator,service-consumer"
---
# NodePort 5173 is mapped to host port 5173 via Kind extraPortMappings in
# config/kind/app.yaml. service-node-port-range is expanded to 80-65535.
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: servicer-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: web
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 5173
