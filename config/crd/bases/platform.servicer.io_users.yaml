              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UserSpec defines a Servicer user identity.
            properties:
              displayName:
                description: DisplayName is the human-readable name.
                type: string
              email:
                description: Email is the primary email address when known.
                type: string
