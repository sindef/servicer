                    type: string
                  name:
                    description: Name is the target object's name.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace is optional for namespaced targets.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                type: object
              phase:
                description: Phase is the coarse execution summary.
                type: string
              result:
                description: Result captures the execution outcome.
