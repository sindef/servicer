kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: actionrequests.platform.servicer.io
spec:
  group: platform.servicer.io
  names:
    kind: ActionRequest
    listKind: ActionRequestList
    plural: actionrequests
    shortNames:
    - actreq
    singular: actionrequest
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.action
      name: Action
      type: string
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ActionRequest is the audit envelope for asynchronous day-2 platform
          actions.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ActionRequestSpec defines the desired state of an ActionRequest.
            properties:
              action:
                description: Action is the platform action name, such as backup or
                  restart.
                minLength: 1
                type: string
              approval:
                description: Approval captures the approval state for the action.
                properties:
                  approvedBy:
                    description: ApprovedBy records the approvers once approval occurs.
                    items:
                      type: string
                    type: array
                  mode:
                    description: Mode captures the requested or current approval state.
                    enum:
                    - auto
                    - required
                    - approved
                    - rejected
                    type: string
                required:
                - mode
                type: object
              idempotencyKey:
                description: IdempotencyKey prevents accidental duplicate submissions.
                minLength: 1
                type: string
              parameters:
                description: Parameters holds action-specific configuration.
                x-kubernetes-preserve-unknown-fields: true
              requestedBy:
                description: RequestedBy identifies the actor that initiated the request.
                properties:
                  source:
                    description: Source identifies the initiating path.
