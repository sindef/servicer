  name: servicebindings.platform.servicer.io
spec:
  group: platform.servicer.io
  names:
    kind: ServiceBinding
    listKind: ServiceBindingList
    plural: servicebindings
    shortNames:
    - svcbind
    singular: servicebinding
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.projectRef.name
      name: Project
      type: string
    - jsonPath: .spec.sourceRef.name
      name: Source
      type: string
    - jsonPath: .spec.targetRef.name
      name: Target
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ServiceBinding is the operator-neutral API for credential sharing
          between products and consumers.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ServiceBindingSpec defines the desired state of a ServiceBinding.
            properties:
              projectRef:
                description: ProjectRef references the owning project.
                properties:
                  name:
                    description: Name is the stable resource name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              secretPolicy:
                description: SecretPolicy defines how bound credentials are delivered.
                properties:
                  deliveryMode:
                    description: DeliveryMode selects the secret delivery pattern.
                    enum:
                    - external-secret
                    - direct-secret-ref
                    - manual
                    type: string
                  externalSecretProvider:
                    description: ExternalSecretProvider selects the backing provider when
                      deliveryMode=external-secret.
                    enum:
                    - kubernetes
                    - vault
                    type: string
                  vault:
                    description: Vault configures Vault-backed projection when externalSecretProvider=vault.
                    properties:
                      authSecretRef:
                        description: AuthSecretRef points at the Secret containing the Vault token.
                        properties:
                          name:
                            description: Name is the resource name.
                            minLength: 1
                            type: string
                          namespace:
                            description: Namespace is the resource namespace.
                            minLength: 1
                            type: string
                        required:
                        - name
                        - namespace
                        type: object
                      path:
                        description: Path is the Vault mount path that contains the credential secret.
                        type: string
                      server:
                        description: Server is the Vault API base URL.
                        type: string
