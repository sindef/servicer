---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: projects.platform.servicer.io
spec:
  group: platform.servicer.io
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    shortNames:
    - proj
    singular: project
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.tenantRef.name
      name: Tenant
      type: string
    - jsonPath: .spec.environment
      name: Environment
      type: string
    - jsonPath: .status.placement.clusterName
      name: Cluster
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Project is the primary deployment and environment boundary within
          a tenant.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProjectSpec defines the desired state of a Project.
            properties:
              displayName:
                description: DisplayName is the human-readable name for the project.
                minLength: 1
                type: string
              environment:
                description: Environment identifies the operational environment for
                  the project.
                enum:
                - development
                - staging
                - production
                - sandbox
                type: string
              labels:
                additionalProperties:
                  type: string
                description: Labels are propagated into generated assets and runtime
                  metadata.
                type: object
              namespaceStrategy:
                description: NamespaceStrategy describes how namespaces are allocated
                  for the project.
                properties:
                  mode:
                    description: Mode selects the namespace allocation pattern.
                    enum:
                    - dedicated
                    - shared
                    - bring-your-own
                    type: string
                  prefix:
                    description: Prefix is the prefix used for generated namespaces.
                    type: string
                required:
                - mode
                type: object
              policyRefs:
                description: PolicyRefs references project-specific policy bundles.
                items:
                  description: PolicyReference points to a policy bundle or policy
                    object.
                  properties:
                    name:
                      description: Name identifies the referenced policy bundle.
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              quotas:
                description: Quotas captures project-local soft limits.
                properties:
                  maxNamespaces:
                    description: MaxNamespaces limits the number of namespaces the
                      project may own.
                    format: int32
                    type: integer
                  maxServices:
                    description: MaxServices limits the number of child ServiceInstances.
                    format: int32
                    type: integer
                type: object
              targetSelector:
                description: TargetSelector describes explicit or rule-based cluster
                  placement intent.
                properties:
                  clusterRef:
                    description: ClusterRef pins the project to a specific target
                      cluster.
                    properties:
                      name:
                        description: Name is the stable resource name.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: MatchLabels selects a cluster by capability or policy
                      labels.
                    type: object
                type: object
              tenantRef:
                description: TenantRef references the owning tenant.
                properties:
                  name:
                    description: Name is the stable resource name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - displayName
            - environment
            - namespaceStrategy
            - tenantRef
            type: object
          status:
            description: ProjectStatus defines the observed state of a Project.
            properties:
              conditions:
                description: Conditions contains the current status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectiveQuota:
                description: EffectiveQuota captures the resolved quota values after
                  inheritance.
                properties:
                  maxNamespaces:
                    description: MaxNamespaces limits the number of namespaces the
                      project may own.
                    format: int32
                    type: integer
                  maxServices:
                    description: MaxServices limits the number of child ServiceInstances.
                    format: int32
                    type: integer
                type: object
              observedGeneration:
                description: ObservedGeneration is the most recent processed generation.
                format: int64
                type: integer
              phase:
                description: Phase is the coarse lifecycle summary.
                type: string
              placement:
                description: Placement captures the resolved placement state.
                properties:
                  clusterName:
                    description: ClusterName is the resolved target cluster.
                    type: string
                  namespace:
                    description: Namespace is the resolved target namespace when relevant.
                    type: string
                type: object
              usageSummary:
                description: UsageSummary aggregates child namespace and service counts.
                properties:
                  namespaces:
                    description: Namespaces is the number of child namespaces.
                    format: int32
                    type: integer
                  projects:
                    description: Projects is the number of child projects.
                    format: int32
                    type: integer
                  serviceInstances:
                    description: ServiceInstances is the number of child service instances.
                    format: int32
                    type: integer
                  services:
                    description: Services is the number of child services.
                    format: int32
                    type: integer
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
