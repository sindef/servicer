---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: authproviders.platform.servicer.io
spec:
  group: platform.servicer.io
  names:
    kind: AuthProvider
    listKind: AuthProviderList
    plural: authproviders
    shortNames:
    - authp
    singular: authprovider
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .spec.default
      name: Default
      type: boolean
    - jsonPath: .status.phase
      name: Phase
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AuthProvider defines one authentication provider exposed by Servicer.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AuthProviderSpec defines one enterprise authentication provider.
            properties:
              default:
                description: Default marks the provider as the preferred login option.
                type: boolean
              displayName:
                description: DisplayName is the human-readable provider name shown
                  in the login UI.
                type: string
              enabled:
                description: Enabled exposes the provider for login.
                type: boolean
              ldap:
                description: LDAP contains the LDAP-specific configuration when type=ldap.
                properties:
                  bindSecretRef:
                    description: BindSecretRef references the bind account Secret
                      used for directory searches.
                    properties:
                      name:
                        description: Name is the resource name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace is the resource namespace.
                        minLength: 1
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  emailAttribute:
                    description: EmailAttribute is the attribute copied into the Servicer
                      identity when present.
                    type: string
                  groupBaseDn:
                    description: GroupBaseDN is the base DN used to discover group
                      membership.
                    type: string
                  groupFilter:
                    description: GroupFilter is the LDAP filter used to search for
                      groups. Use %s for the escaped user DN.
                    type: string
                  groupNameAttribute:
                    description: GroupNameAttribute is the group attribute whose value
                      becomes a Servicer group name.
                    type: string
                  insecureSkipVerify:
                    description: InsecureSkipVerify allows insecure TLS verification
                      for test environments.
                    type: boolean
                  startTls:
                    description: StartTLS enables StartTLS on plain LDAP connections.
                    type: boolean
                  url:
                    description: URL is the LDAP or LDAPS server URL.
                    type: string
                  userBaseDn:
                    description: UserBaseDN is the base DN used to find user entries.
                    type: string
                  userFilter:
                    description: UserFilter is the LDAP filter used to search for
                      users. Use %s for the escaped username.
                    type: string
                  usernameAttribute:
                    description: UsernameAttribute is the attribute copied into the
                      Servicer identity when present.
                    type: string
                type: object
              oidc:
                description: OIDC contains the OIDC-specific configuration when type=oidc.
                properties:
                  clientId:
                    description: ClientID is the registered OIDC client identifier.
                    type: string
                  clientSecretRef:
                    description: ClientSecretRef references the Secret containing
                      the client secret.
                    properties:
                      name:
                        description: Name is the resource name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace is the resource namespace.
                        minLength: 1
                        type: string
                    required:
                    - name
                    - namespace
                    type: object
                  emailClaim:
                    description: EmailClaim is the email claim used for display or
                      fallback identity mapping.
                    type: string
                  endSessionUrl:
                    description: EndSessionURL overrides the provider end-session
                      endpoint when needed.
                    type: string
                  groupsClaim:
                    description: GroupsClaim is the claim that contains upstream group
                      names.
                    type: string
                  issuerUrl:
                    description: IssuerURL is the OIDC issuer discovery URL.
                    type: string
                  redirectPath:
                    description: RedirectPath is the callback path served by the BFF.
                    type: string
                  rolesClaim:
                    description: RolesClaim is the claim that contains upstream role
                      names.
                    type: string
                  scopes:
                    description: Scopes are the OAuth scopes requested during login.
                    items:
                      type: string
                    type: array
                  usernameClaim:
                    description: UsernameClaim is the preferred user-identity claim.
                    type: string
                type: object
              type:
                description: Type selects the provider implementation.
                enum:
                - local
                - oidc
                - ldap
                type: string
            required:
            - displayName
            - enabled
            - type
            type: object
          status:
            description: AuthProviderStatus defines the observed state of an AuthProvider.
            properties:
              conditions:
                description: Conditions contains current readiness and validation
                  conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent processed generation.
                format: int64
                type: integer
              phase:
                description: Phase is the coarse lifecycle summary.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
