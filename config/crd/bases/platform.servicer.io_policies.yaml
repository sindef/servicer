    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Policy is a reusable user-defined policy bundle referenced by
          tenancy and catalog objects.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PolicySpec defines the desired state of a Policy.
            properties:
              description:
                description: Description summarizes the policy intent.
                type: string
              displayName:
                description: DisplayName is the human-readable name for the policy.
                minLength: 1
                type: string
              rules:
                description: Rules are evaluated as deny rules when referenced by
                  a resource.
                items:
                  description: PolicyRule defines one user-authored validation rule.
                  properties:
                    message:
                      description: Message is returned when the rule is violated.
                      type: string
                    name:
                      description: Name is a stable identifier for the rule inside
                        the policy.
                      minLength: 1
                      type: string
                    operator:
                      description: Operator selects the comparison operation.
                      enum:
                      - equals
                      - not-equals
                      - in
                      - not-in
                      - exists
                      - not-exists
                      - gt
                      - gte
                      - lt
                      - lte
                      - empty
                      - not-empty
                      type: string
                    path:
                      description: Path identifies the evaluated field path, such
                        as spec.exposure.mode or parameters.replicas.
                      type: string
                    value:
                      description: Value is the single comparison value used by scalar
                        operators.
                      type: string
                    values:
                      description: Values are the comparison values used by set operators.
                      items:
                        type: string
                      type: array
                  required:
