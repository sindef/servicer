---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: operatorpackages.platform.servicer.io
spec:
  group: platform.servicer.io
  names:
    kind: OperatorPackage
    listKind: OperatorPackageList
    plural: operatorpackages
    shortNames:
    - oppkg
    singular: operatorpackage
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.targetNamespace
      name: Namespace
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: OperatorPackage is a cluster-scoped catalog entry describing
          an operator that the platform can ensure is installed on ClusterTargets
          that require it.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: OperatorPackageSpec defines the desired state of an OperatorPackage.
            properties:
              description:
                description: Description provides a longer description of what this operator does.
                type: string
              displayName:
                description: DisplayName is the human-readable name for this operator package.
                type: string
              probes:
                description: Probes lists CRD names whose presence indicates the operator is already installed.
                items:
                  description: OperatorProbe defines a CRD whose presence indicates the operator is installed.
                  properties:
                    crd:
                      description: 'CRD is the fully-qualified CustomResourceDefinition name to probe for. Example: "clusters.postgresql.cnpg.io"'
                      type: string
                  required:
                  - crd
                  type: object
                minItems: 1
                type: array
              source:
                description: Source defines where the operator manifests live.
                properties:
                  manifestURL:
                    description: ManifestURL is a direct HTTP/HTTPS URL to a pre-built multi-document
                      YAML manifest. Used for direct installation when ArgoCD is not available.
                    type: string
                  path:
                    description: Path is the directory within the repository containing the operator manifests or kustomize overlay.
                    type: string
                  repoURL:
                    description: RepoURL is the Git repository URL ArgoCD should use for this operator.
                    type: string
                  targetRevision:
                    default: HEAD
                    description: TargetRevision is the branch, tag, or commit SHA to track. Defaults to HEAD.
                    type: string
                type: object
              targetNamespace:
                default: operators
                description: TargetNamespace is the namespace the operator should be installed into on each cluster.
                type: string
              version:
                description: Version is the operator package version label.
                type: string
            required:
            - displayName
            - probes
            type: object
          status:
            description: OperatorPackageStatus defines the observed state of an OperatorPackage.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
