---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: tenants.platform.servicer.io
spec:
  group: platform.servicer.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    shortNames:
    - ten
    singular: tenant
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.usageSummary.projects
      name: Projects
      type: integer
    - jsonPath: .status.usageSummary.serviceInstances
      name: Services
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Tenant is the top-level tenancy boundary for the Servicer platform.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TenantSpec defines the desired state of a Tenant.
            properties:
              allowedServiceClasses:
                description: AllowedServiceClasses lists the service classes this
                  tenant may request.
                items:
                  type: string
                minItems: 1
                type: array
              contacts:
                description: Contacts provides operational contact paths for the tenant.
                items:
                  description: ContactSpec captures an operational contact path for
                    a tenant.
                  properties:
                    type:
                      description: Type describes the contact medium such as slack
                        or email.
                      minLength: 1
                      type: string
                    value:
                      description: Value contains the contact target.
                      minLength: 1
                      type: string
                  required:
                  - type
                  - value
                  type: object
                type: array
              displayName:
                description: DisplayName is the human-readable name for the tenant.
                minLength: 1
                type: string
              lifecycle:
                description: Lifecycle captures the desired lifecycle state.
                properties:
                  phase:
                    description: Phase is the desired lifecycle phase.
                    enum:
                    - active
                    - suspended
                    - deleting
                    type: string
                required:
                - phase
                type: object
              owners:
                description: Owners defines the ownership boundary for the tenant.
                properties:
                  groups:
                    description: Groups are identity-provider groups with ownership
                      rights.
                    items:
                      type: string
                    type: array
                  users:
                    description: Users are direct user identities with ownership rights.
                    items:
                      type: string
                    type: array
                type: object
              policyRefs:
                description: PolicyRefs references policy bundles applied to child
                  resources.
                items:
                  description: PolicyReference points to a policy bundle or policy
                    object.
                  properties:
                    name:
                      description: Name identifies the referenced policy bundle.
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                type: array
              quotaProfileRef:
                description: QuotaProfileRef references a curated quota profile.
                properties:
                  name:
                    description: Name is the stable resource name.
                    minLength: 1
                    type: string
                required:
                - name
                type: object
            required:
            - allowedServiceClasses
            - displayName
            - lifecycle
            - owners
            - quotaProfileRef
            type: object
          status:
            description: TenantStatus defines the observed state of a Tenant.
            properties:
              conditions:
                description: Conditions contains the current status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              effectivePolicies:
                description: EffectivePolicies lists the resolved policy bundles.
                items:
                  type: string
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent processed generation.
                format: int64
                type: integer
              phase:
                description: Phase is the coarse lifecycle summary.
                type: string
              usageSummary:
                description: UsageSummary aggregates child project and service counts.
                properties:
                  namespaces:
                    description: Namespaces is the number of child namespaces.
                    format: int32
                    type: integer
                  projects:
                    description: Projects is the number of child projects.
                    format: int32
                    type: integer
                  serviceInstances:
                    description: ServiceInstances is the number of child service instances.
                    format: int32
                    type: integer
                  services:
                    description: Services is the number of child services.
                    format: int32
                    type: integer
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
