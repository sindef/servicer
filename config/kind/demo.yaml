# Kind cluster configuration for the Servicer docker-compose demo.
#
# The API server binds on 0.0.0.0:6443 so it is reachable from the Docker host
# and from other docker-compose containers via host.docker.internal:6443.
# The kubeadm patch adds host.docker.internal to the API server TLS cert SANs
# so that TLS verification succeeds from inside docker-compose service containers.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      certSANs:
        - "host.docker.internal"
        - "localhost"
        - "127.0.0.1"
nodes:
  - role: control-plane
