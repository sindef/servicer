apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: servicer-platform-mutating-webhooks
webhooks:
  - name: mserviceinstance.platform.servicer.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: servicer-webhook-service
        namespace: servicer-system
        path: /mutate-platform-servicer-io-v1alpha1-serviceinstance
    rules:
      - apiGroups: ["platform.servicer.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceinstances"]
  - name: mnamespaceclaim.platform.servicer.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: servicer-webhook-service
        namespace: servicer-system
        path: /mutate-platform-servicer-io-v1alpha1-namespaceclaim
    rules:
      - apiGroups: ["platform.servicer.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaceclaims"]
  - name: mservicebinding.platform.servicer.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: servicer-webhook-service
        namespace: servicer-system
        path: /mutate-platform-servicer-io-v1alpha1-servicebinding
    rules:
      - apiGroups: ["platform.servicer.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["servicebindings"]
  - name: mvirtualmachineclaim.platform.servicer.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    clientConfig:
      service:
        name: servicer-webhook-service
        namespace: servicer-system
        path: /mutate-platform-servicer-io-v1alpha1-virtualmachineclaim
    rules:
      - apiGroups: ["platform.servicer.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["virtualmachineclaims"]
