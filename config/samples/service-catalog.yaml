apiVersion: platform.servicer.io/v1alpha1
kind: ServiceClass
metadata:
  name: namespace
spec:
  displayName: Kubernetes Namespace
  category: platform
  driver: kubernetes-namespace
  capabilityFlags:
    - resource-quota
    - baseline-policy
  published: true
---
apiVersion: platform.servicer.io/v1alpha1
kind: ServicePlan
metadata:
  name: namespace-team
spec:
  serviceClassRef:
    name: namespace
  displayName: Team Namespace
  tier: standard
  topology: dedicated
  defaultParameters:
    cpu: "2"
    memory: 4Gi
    pods: "20"
    defaultDenyIngress: true
    labels:
      platform.mnorris.dev/profile: workload
---
apiVersion: platform.servicer.io/v1alpha1
kind: ServiceClass
metadata:
  name: postgresql
spec:
  displayName: PostgreSQL
  category: database
  driver: cnpg
  supportedVersions:
    - "16"
    - "15"
  capabilityFlags:
    - backups
    - high-availability
  allowsVersionOverride: true
  published: true
---
apiVersion: platform.servicer.io/v1alpha1
kind: ServicePlan
metadata:
  name: postgresql-ha
spec:
  serviceClassRef:
    name: postgresql
  displayName: Standard HA
  tier: standard
  topology: single-cluster
  defaultVersion: "16"
  allowsVersionOverride: true
  defaultParameters:
    storageSize: 100Gi
    backupProfile: daily-7d
---
apiVersion: platform.servicer.io/v1alpha1
kind: ServicePlan
metadata:
  name: postgresql-dev
spec:
  serviceClassRef:
    name: postgresql
  displayName: Development
  tier: standard
  topology: single-cluster
  defaultVersion: "16"
  allowsVersionOverride: true
  defaultParameters:
    instances: 1
    storageSize: 20Gi
---
apiVersion: platform.servicer.io/v1alpha1
