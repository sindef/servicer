    memory: 2Gi
    storageSize: 100Gi
    backupProfile: daily-7d
---
apiVersion: platform.servicer.io/v1alpha1
kind: ServicePlan
metadata:
  name: mysql-active-passive
spec:
  serviceClassRef:
    name: mysql
  displayName: Standard HA
  tier: high-availability
  topology: multi-region
  defaultVersion: "8.4"
  allowsVersionOverride: true
  defaultParameters:
    replicationMode: active-passive
    replicas: 1
    cpu: "1"
    memory: 2Gi
    storageSize: 100Gi
    backupProfile: daily-7d
---
apiVersion: platform.servicer.io/v1alpha1
kind: ServicePlan
metadata:
  name: mysql-dev
spec:
  serviceClassRef:
    name: mysql
  displayName: Development
  tier: development
  topology: single-cluster
  defaultVersion: "8.4"
  allowsVersionOverride: true
  defaultParameters:
    replicationMode: single-primary
    replicas: 1
