# Operator package catalog for the local-dev demo environment.
# These entries describe operators the platform can ensure are installed
# on ClusterTargets that declare them as required.
#
# manifestURL: direct single-file install manifest used when ArgoCD is absent.
# source.repoURL/path: ArgoCD delivery path used when ArgoCD is present.
---
apiVersion: platform.servicer.io/v1alpha1
kind: OperatorPackage
metadata:
  name: cnpg
spec:
  displayName: CloudNative PG
  description: >-
    The CloudNativePG operator manages PostgreSQL clusters on Kubernetes.
    Required for the postgresql service class.
  version: "1.24.0"
  targetNamespace: cnpg-system
  probes:
    - crd: clusters.postgresql.cnpg.io
  source:
    manifestURL: https://github.com/cloudnative-pg/cloudnative-pg/releases/download/v1.24.0/cnpg-1.24.0.yaml
    repoURL: https://github.com/cloudnative-pg/cloudnative-pg
    path: releases/cnpg-1.24.0.yaml
    targetRevision: release-1.24
---
apiVersion: platform.servicer.io/v1alpha1
kind: OperatorPackage
metadata:
  name: external-secrets
spec:
  displayName: External Secrets Operator
  description: >-
    ESO synchronises secrets from external stores (Vault, AWS SM, etc.)
    into Kubernetes. Required for cross-cluster credential projection.
  version: "0.10.7"
  targetNamespace: external-secrets
  probes:
    - crd: externalsecrets.external-secrets.io
    - crd: secretstores.external-secrets.io
  source:
    manifestURL: https://github.com/external-secrets/external-secrets/releases/download/v0.10.7/external-secrets.yaml
    repoURL: https://github.com/external-secrets/external-secrets
    path: deploy/charts/external-secrets
    targetRevision: v0.10.7
---
apiVersion: platform.servicer.io/v1alpha1
kind: OperatorPackage
metadata:
  name: yugabyte
spec:
  displayName: YugabyteDB Operator
  description: >-
    The YugabyteDB operator manages YBUniverse clusters on Kubernetes.
    Required for the yugabyte service class.
  version: "0.1.6"
  targetNamespace: yugabyte-system
  probes:
    - crd: ybuniverses.operator.yugabyte.io
  source:
    manifestURL: https://raw.githubusercontent.com/yugabyte/yugabyte-k8s-operator/v0.1.6/crd/concatenated_crd.yaml
    chartArchiveURL: https://codeload.github.com/yugabyte/yugabyte-k8s-operator/tar.gz/refs/tags/v0.1.6
    chartPath: chart
    helmValues:
      rbac.create: "true"
      yugaware.kubernetesOperatorNamespace: yugabyte-system
      yugaware.service.type: ClusterIP
      yugaware.resources.requests.cpu: 500m
      yugaware.resources.requests.memory: 1Gi
      postgres.resources.requests.cpu: 250m
      postgres.resources.requests.memory: 512Mi
      yugaware.defaultUser.enabled: "true"
      yugaware.defaultUser.username: servicer-demo
      yugaware.defaultUser.email: servicer-demo@example.com
      yugaware.defaultUser.password: ServicerDemo123!
