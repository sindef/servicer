apiVersion: platform.servicer.io/v1alpha1
kind: Tenant
metadata:
  name: demo
spec:
  displayName: Demo Tenant
  owners:
    users:
      - demo@servicer.local
  quotaProfileRef:
    name: standard
  allowedServiceClasses:
    - namespace
    - postgresql
    - mysql
    - valkey
    - nats
    - yugabyte
    - argo-application
  lifecycle:
    phase: active
---
apiVersion: platform.servicer.io/v1alpha1
kind: Project
metadata:
  name: demo-prod
spec:
  tenantRef:
    name: demo
  displayName: Demo Production
  environment: production
  targetSelector:
    clusterRef:
      name: local-dev
  namespaceStrategy:
    mode: dedicated
    prefix: demo-prod
  quotas:
    maxServices: 20
    maxNamespaces: 10
