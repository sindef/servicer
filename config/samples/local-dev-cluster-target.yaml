apiVersion: v1
kind: Namespace
metadata:
  name: servicer-system
  labels:
    platform.mnorris.dev/profile: platform
---
apiVersion: v1
kind: Secret
metadata:
  name: local-dev-kubeconfig
  namespace: servicer-system
type: Opaque
stringData:
  kubeconfig: |
    apiVersion: v1
    kind: Config
    clusters: []
    contexts: []
    current-context: ""
    users: []
---
apiVersion: platform.servicer.io/v1alpha1
kind: ClusterTarget
metadata:
  name: local-dev
spec:
  displayName: Local Development Cluster
  connectionRef:
    name: local-dev-kubeconfig
    namespace: servicer-system
  region: local
  ingressDomain: apps.local.dev
  capabilities:
    kubernetesVersion: v1.32.0
    operator.cnpg: available
    operator.nats: available
    operator.servicer-valkey: planned
    storageclass.default: standard
