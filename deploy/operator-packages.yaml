apiVersion: platform.servicer.io/v1alpha1
kind: OperatorPackage
metadata:
  name: external-secrets
spec:
  displayName: External Secrets Operator
  description: >-
    ESO synchronises secrets from external stores into Kubernetes and is
    required for external-secret credential delivery modes.
  version: "0.10.7"
  targetNamespace: external-secrets
  probes:
    - crd: externalsecrets.external-secrets.io
    - crd: secretstores.external-secrets.io
  source:
    manifestURL: https://raw.githubusercontent.com/external-secrets/external-secrets/v0.10.7/deploy/crds/bundle.yaml
    chartArchiveURL: https://codeload.github.com/external-secrets/external-secrets/tar.gz/refs/tags/v0.10.7
    repoURL: https://github.com/external-secrets/external-secrets
    path: deploy/charts/external-secrets
    chartPath: deploy/charts/external-secrets
    helmValues:
      installCRDs: "true"
      webhook.create: "false"
      certController.create: "false"
      crds.conversion.enabled: "false"
    targetRevision: v0.10.7
---
apiVersion: platform.servicer.io/v1alpha1
kind: OperatorPackage
metadata:
  name: cnpg
spec:
  displayName: CloudNativePG
  description: >-
    CloudNativePG manages PostgreSQL clusters and is required for the
    production PostgreSQL service class.
  version: "1.25.4"
  targetNamespace: cnpg-system
  probes:
    - crd: clusters.postgresql.cnpg.io
    - crd: backups.postgresql.cnpg.io
    - crd: scheduledbackups.postgresql.cnpg.io
  source:
    manifestURL: https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.4.yaml
    repoURL: https://github.com/cloudnative-pg/cloudnative-pg
    path: releases
    targetRevision: release-1.25
---
apiVersion: platform.servicer.io/v1alpha1
kind: OperatorPackage
metadata:
  name: yugabyte
spec:
  displayName: YugabyteDB Operator
  description: >-
    YugabyteDB Operator manages YBUniverse resources and is required for the
    production YugabyteDB service class.
  version: "2024-01-11-545a8b40af54"
  targetNamespace: yugabyte-system
  probes:
    - crd: ybuniverses.operator.yugabyte.io
  source:
    repoURL: https://github.com/yugabyte/yugabyte-k8s-operator
    path: config/default
    targetRevision: 545a8b40af54
