apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: servicer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bff
    spec:
      serviceAccountName: servicer
      containers:
        - name: bff
          image: ghcr.io/sindef/servicer-bff:latest
          imagePullPolicy: IfNotPresent
          args:
            - --listen=:8090
            - --tls-listen=
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: servicer-system
spec:
  selector:
    app.kubernetes.io/name: bff
  ports:
    - port: 8090
      targetPort: 8090
