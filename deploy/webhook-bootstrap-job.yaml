apiVersion: batch/v1
kind: Job
metadata:
  name: servicer-webhook-bootstrap
  namespace: servicer-system
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: servicer
      containers:
        - name: webhook-bootstrap
          image: ghcr.io/sindef/servicer-manager:latest
          imagePullPolicy: IfNotPresent
          args:
            - --webhook-bootstrap-only=true
            - --system-namespace=servicer-system
            - --webhook-service-name=servicer-webhook-service
            - --webhook-cert-secret-name=servicer-webhook-server-cert
