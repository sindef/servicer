apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: servicer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      containers:
        - name: web
          image: ghcr.io/sindef/servicer-web:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: BFF_URL
              value: "http://bff.servicer-system.svc.cluster.local:8090"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: servicer-system
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - port: 80
      targetPort: 8080
