name: Build

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master", "release/**"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/servicer
  GOVULNCHECK_VERSION: v1.1.4
  GOSEC_VERSION: v2.22.5

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Verify dependencies
        run: go mod verify

      - name: Go test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Webhook validation tests
        run: go test ./api/v1alpha1 -run 'Webhook|Validate'

      - name: Controller integration tests
        run: go test ./internal/controllers -run 'Reconciler|Controller'

      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

      - name: Static security scan
        run: go run github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION} ./...

      - name: Helm CLI smoke test
        run: ./hack/helm-cli-smoke.sh

      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Frontend lint
        working-directory: web
        run: |
          npm ci
          npm run lint

      - name: Frontend unit tests
        working-directory: web
        run: npm run test:unit

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Bundle budget
        working-directory: web
        run: npm run build:budget

      - name: Audit web dependencies
        working-directory: web
        run: npm audit --omit=dev --audit-level=high

      - name: Validate deploy manifests
        run: kubectl kustomize config/deploy > /dev/null

      - name: Validate production manifests
        run: kubectl kustomize deploy > /dev/null

      - name: Validate production manifest policy
        run: ./hack/manifest-policy.sh deploy

      - name: NetworkPolicy manifest smoke
        run: ./hack/networkpolicy-smoke.sh

      - name: Validate sample manifests
        run: kubectl kustomize config/samples > /dev/null

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: ignore

  build-bff:
    name: Build & push bff image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-bff
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile.bff
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-manager:
    name: Build & push manager image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-manager
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile.manager
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-syncer:
    name: Build & push syncer image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-syncer
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile.syncer
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build & push web image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-tools:
    name: Build & push tools image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-tools
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile.tools
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kind-smoke:
    name: KinD GitOps smoke
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run KinD GitOps smoke
        run: ./hack/e2e-gitops.sh

  publish-install-manifest:
    name: Publish install manifest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-bff
      - build-manager
      - build-syncer
      - build-web
      - build-tools
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Render install manifest
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/servicer
        run: |
          ./hack/render-deploy-manifest.sh "${GITHUB_REF_NAME}" > "servicer-install-${GITHUB_REF_NAME}.yaml"

      - name: Upload install manifest artifact
        uses: actions/upload-artifact@v7
        with:
          name: servicer-install-${{ github.ref_name }}
          path: servicer-install-${{ github.ref_name }}.yaml

      - name: Attach install manifest to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: servicer-install-${{ github.ref_name }}.yaml

  release-security:
    name: Release security (${{ matrix.component }})
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-bff
      - build-manager
      - build-syncer
      - build-web
      - build-tools
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        component: [bff, manager, syncer, web, tools]
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/servicer-${{ matrix.component }}:${{ github.ref_name }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for image tag in GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for ${IMAGE} to be available..."
          for attempt in $(seq 1 60); do
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image is available: ${IMAGE}"
              exit 0
            fi
            echo "Attempt ${attempt}/60: image not available yet, sleeping 30s"
            sleep 30
          done
          echo "Timed out waiting for ${IMAGE}"
          exit 1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Sign image
        run: cosign sign --yes "${IMAGE}"
