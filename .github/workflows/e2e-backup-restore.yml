name: Backup Restore E2E

on:
  workflow_dispatch:

jobs:
  backup-restore:
    name: KinD backup restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.10"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run backup/restore e2e
        run: ./hack/e2e-backup-restore.sh
