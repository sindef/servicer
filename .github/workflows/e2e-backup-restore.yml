name: Backup Restore E2E

on:
  workflow_dispatch:

jobs:
  backup-restore:
    name: KinD backup restore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          install_only: true

      - name: Run backup/restore e2e
        run: ./hack/e2e-backup-restore.sh
