name: GitOps E2E

on:
  pull_request:
    branches: ["master", "release/**"]
  push:
    branches: ["release/**"]
  workflow_dispatch:

jobs:
  kind-gitops:
    name: KinD GitOps delivery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: NetworkPolicy smoke
        run: ./hack/networkpolicy-smoke.sh

      - name: Run GitOps e2e
        run: ./hack/e2e-gitops.sh
