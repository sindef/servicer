name: GitOps E2E

on:
  pull_request:
    branches: ["master", "release/**"]
  push:
    branches: ["release/**"]
  workflow_dispatch:

jobs:
  kind-gitops:
    name: KinD GitOps delivery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26.3"
          cache: true
          cache-dependency-path: go.sum

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          install_only: true

      - name: NetworkPolicy manifest smoke
        run: ./hack/networkpolicy-smoke.sh

      - name: Run GitOps e2e
        run: ./hack/e2e-gitops.sh

      - name: NetworkPolicy runtime smoke
        run: ./hack/networkpolicy-smoke.sh runtime
