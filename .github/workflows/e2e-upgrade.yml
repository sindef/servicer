name: Upgrade E2E

on:
  workflow_dispatch:
    inputs:
      previous_version:
        description: Previous released Servicer version
        required: false
        default: v0.1.0

jobs:
  upgrade:
    name: KinD upgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Run upgrade e2e
        env:
          PREVIOUS_VERSION: ${{ inputs.previous_version }}
        run: ./hack/e2e-upgrade.sh
