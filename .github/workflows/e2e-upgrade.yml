name: Upgrade E2E

on:
  workflow_dispatch:
    inputs:
      previous_version:
        description: Previous released Servicer version
        required: false
        default: v0.1.0

jobs:
  upgrade:
    name: KinD upgrade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d
        with:
          version: v1.32.2

      - name: Set up KinD
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          install_only: true

      - name: Run upgrade e2e
        env:
          PREVIOUS_VERSION: ${{ inputs.previous_version }}
        run: ./hack/e2e-upgrade.sh
