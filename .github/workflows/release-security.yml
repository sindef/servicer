name: Release Security

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  sign-and-scan:
    name: Sign and scan images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [bff, manager, syncer, web, tools]
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/servicer-${{ matrix.component }}:${{ github.ref_name }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for image tag in GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "Waiting for ${IMAGE} to be available..."
          for attempt in $(seq 1 60); do
            if docker manifest inspect "${IMAGE}" > /dev/null 2>&1; then
              echo "Image is available: ${IMAGE}"
              exit 0
            fi
            echo "Attempt ${attempt}/60: image not available yet, sleeping 20s"
            sleep 20
          done
          echo "Timed out waiting for ${IMAGE}"
          exit 1

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          scanners: vuln
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Sign image
        run: cosign sign --yes "${IMAGE}"
