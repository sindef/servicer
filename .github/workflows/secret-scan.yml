name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Daily at 02:00 UTC — catches secrets landed in older commits
    - cron: "0 2 * * *"

jobs:
  gitleaks:
    name: Gitleaks credential scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed for scheduled full-repo scans
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

